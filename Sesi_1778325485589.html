<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi Photobooth Anda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #111827; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .container { background-color: #1f2937; border-radius: 24px; padding: 24px; max-width: 400px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; border: 1px solid #374151; }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { color: #9ca3af; font-size: 14px; margin-bottom: 24px; }
        img { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid #374151; background: white; }
        a.btn { display: block; background-color: #2563eb; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: bold; margin-bottom: 24px; transition: background 0.3s; }
        a.btn:hover { background-color: #1d4ed8; }
        a.btn-purple { background-color: #7c3aed; }
        a.btn-purple:hover { background-color: #6d28d9; }
        .badge { background-color: #7c3aed; color: white; font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 20px; position: absolute; top: -10px; right: -10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .img-wrapper { position: relative; display: inline-block; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Momen Anda!</h1>
        <p>Terima kasih telah menggunakan Photobooth.</p>
        
        <div class="img-wrapper">
            <img src="Sesi_1778325485589.png" alt="Photo">
        </div>
        <a href="Sesi_1778325485589.png" download="Photobooth_Sesi_1778325485589.png" class="btn">Simpan Frame Foto</a>
        
        <div class="img-wrapper" style="width: 80%;">
            <span class="badge">ANIMASI GIF</span>
            <img src="Sesi_1778325485589.gif" alt="GIF">
        </div>
        <a href="Sesi_1778325485589.gif" download="Photobooth_Sesi_1778325485589.gif" class="btn btn-purple" style="margin-bottom: 0;">Simpan Animasi GIF</a>
    </div>
</body>
</html>
